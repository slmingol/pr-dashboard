<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔀</text></svg>">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PR Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🔀 Pull Request Dashboard</h1>
      <div id="perf-bar" class="perf-bar"></div>
      <div class="header-actions">
        <button id="analytics-btn" class="btn btn-muted" title="Analytics panel">📊</button>
        <button id="keyboard-help-btn" class="btn btn-muted" title="Keyboard shortcuts (?)">⌨</button>
        <button id="theme-toggle" class="btn btn-muted" title="Toggle theme">🌙</button>
        <button id="refresh-ghreport-btn" class="btn btn-success" title="Run ghreport to fetch latest PRs">🔄 Refresh Data</button>
        <button id="refresh-btn" class="btn btn-primary" title="Reload PR list from file">↻ Reload</button>
      </div>
    </header>

    <!-- Progress bar for ghreport refresh -->
    <div id="refresh-progress" class="progress-container hidden">
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
      <div class="progress-text">Fetching latest PRs from GitHub...</div>
    </div>

    <div id="loading" class="loading">Loading PRs...</div>
    <div id="error" class="error hidden"></div>

    <div id="stats" class="stats">
      <div class="stat-item">
        <span class="stat-label">Total PRs</span>
        <span class="stat-value" id="stat-total">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Visible</span>
        <span class="stat-value stat-success" id="stat-visible">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Hidden</span>
        <span class="stat-value stat-muted" id="stat-hidden">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Filtered</span>
        <span class="stat-value stat-primary" id="stat-filtered">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Drafts</span>
        <span class="stat-value stat-muted" id="stat-drafts">0</span>
      </div>
      <div class="stat-item stat-item-clickable" id="repos-stat" title="Click to view watched repos">
        <span class="stat-label">Repos</span>
        <span class="stat-value stat-muted" id="stat-repos">—</span>
      </div>
    </div>

    <!-- Analytics panel (expandable) -->
    <div id="analytics-panel" class="analytics-panel hidden">
      <div class="analytics-grid">
        <div class="analytics-section">
          <h3 class="analytics-heading">Your Review Activity</h3>
          <div id="analytics-activity"></div>
        </div>
        <div class="analytics-section">
          <h3 class="analytics-heading">Age Distribution</h3>
          <div id="analytics-age"></div>
        </div>
        <div class="analytics-section analytics-section-wide">
          <h3 class="analytics-heading">PRs by Repo</h3>
          <div id="analytics-repos"></div>
        </div>
      </div>
      <div class="analytics-footer">
        <a href="/metrics" target="_blank" class="analytics-metrics-link">Open full metrics page ↗</a>
      </div>
    </div>

    <div id="filters" class="filters">
      <input type="text" id="search" placeholder="Search PRs..." />
      <select id="state-filter">
        <option value="all">All States</option>
        <option value="OPEN">Open</option>
        <option value="CLOSED">Closed</option>
        <option value="MERGED">Merged</option>
      </select>
      <label class="checkbox-label">
        <input type="checkbox" id="show-hidden" />
        Show Hidden (<span id="hidden-count">0</span>)
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="show-drafts" checked />
        Show Drafts (<span id="draft-count">0</span>)
      </label>
      <button id="reset-filters-btn" class="btn btn-muted btn-small" title="Reset all filters to defaults">Reset</button>
    </div>

    <div id="pr-list" class="pr-list"></div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <!-- PR Detail Modal -->
    <div id="modal" class="modal hidden">
      <div class="modal-content">
        <span class="close">&times;</span>
        <div id="modal-body"></div>
      </div>
    </div>

    <!-- Comment Input Modal -->
    <div id="comment-modal" class="modal hidden">
      <div class="modal-content modal-small">
        <span class="close-comment">&times;</span>
        <div id="comment-modal-body">
          <h3 id="comment-modal-title">Add Comment</h3>
          <textarea id="comment-input" placeholder="Add your comment here..." rows="6"></textarea>
          <div class="modal-actions">
            <button id="comment-cancel" class="btn btn-muted">Cancel</button>
            <button id="comment-submit" class="btn btn-primary">Submit</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="app-version">
    <span id="app-version"></span>
  </div>

  <script src="app.js"></script>
</body>
</html>
