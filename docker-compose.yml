version: '3.8'

services:
  pr-dashboard:
    build: .
    container_name: pr-dashboard
    ports:
      - "3000:3000"
    volumes:
      # Mount gh CLI config for authentication
      - ~/.config/gh:/root/.config/gh:ro
      
      # Mount ghreport config for repository subscriptions
      - ~/.config/ghreport:/root/.config/ghreport:ro
      
      # Mount ghreport output directory (create if doesn't exist)
      - ~/ghreport-output:/data
      
      # Optional: mount git config if needed for checkout
      - ~/.gitconfig:/root/.gitconfig:ro
      
      # Optional: mount SSH keys if needed
      # - ~/.ssh:/root/.ssh:ro
      
      # Optional: mount ghreport binary if it's a custom tool
      # - /path/to/ghreport:/usr/local/bin/ghreport:ro
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Path to ghreport output file inside container
      - GHREPORT_OUTPUT=/data/ghreport.txt
      # GitHub token for gh CLI (required since container can't access macOS keychain)
      # Get token: gh auth token
      - GH_TOKEN=${GH_TOKEN:-}
      # ghreport requires GITHUB_TOKEN (same value as GH_TOKEN)
      - GITHUB_TOKEN=${GH_TOKEN:-}
      # List of repositories for ghreport to monitor (space-separated)
      - subscribedRepos=${subscribedRepos:-}
    restart: unless-stopped
    networks:
      - pr-dashboard-net

networks:
  pr-dashboard-net:
    driver: bridge
